<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Financial Contrast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="menu-icon">☰</div>
            <h1>LIVE FINANCIAL CONTRAST PLATFORM</h1>
            <div class="info-icon">ⓘ</div>
        </header>

        <nav class="year-selector" id="yearSelector">
            <button class="active">2026</button>
            <button>2025</button>
            <button>2024</button>
            <button>Total</button>
        </nav>

        <nav class="time-tabs" id="timeTabs">
            <button data-unit="sec" class="active">per second</button>
            <button data-unit="min">per minute</button>
            <button data-unit="hour">per hour</button>
            <button data-unit="day">per day</button>
            <button data-unit="week">per week</button>
            <button data-unit="month">per month</button>
            <button data-unit="year">per year</button>
        </nav>

        <main class="contrast-grid">
            <div class="card spending" id="leftCard" data-side="left">
                <div class="methodology-trigger" id="leftMethodology" title="Show Methodology">ⓘ</div>
                
                <div class="card-controls">
                    <button class="mode-switch active" data-mode="spending">SPENDING</button>
                    <button class="mode-switch" data-mode="income">INCOME</button>
                </div>
                <div class="entity-header-block">
                    <div class="entity-header">
                        <img src="" class="entity-icon" id="leftIcon" alt="">
                        <h2 class="entity-name" id="leftName">NASA</h2>
                    </div>
                </div>
                <div class="entity-type" id="leftType">government</div>
                
                <div class="visualizer">
                    <div class="bar" id="leftBar"></div>
                </div>

                <div class="counter-group">
                    <div class="cumulative" id="leftCumulative">0</div>
                    <div class="subtext">cumulative since Jan 1</div>
                </div>

                <div class="live-rate">
                    <span id="leftApprox" class="approx">≈</span>
                    <span id="leftRate">0.00</span> <small id="leftUnit">/ sec</small>
                </div>

                <div class="details-list" id="leftDetails"></div>
            </div>

            <div class="card income" id="rightCard" data-side="right">
                <div class="methodology-trigger" id="rightMethodology" title="Show Methodology">ⓘ</div>

                <div class="card-controls">
                    <button class="mode-switch" data-mode="spending">SPENDING</button>
                    <button class="mode-switch active" data-mode="income">INCOME</button>
                </div>
                <div class="entity-header-block">
                    <div class="entity-header">
                        <img src="" class="entity-icon" id="rightIcon" alt="">
                        <h2 class="entity-name" id="rightName">ELON MUSK</h2>
                    </div>
                </div>
                <div class="entity-type" id="rightType">person</div>

                <div class="visualizer">
                    <div class="bar" id="rightBar"></div>
                </div>

                <div class="counter-group">
                    <div class="cumulative" id="rightCumulative">0</div>
                    <div class="subtext">cumulative since Jan 1</div>
                </div>

                <div class="live-rate">
                    <span id="rightApprox" class="approx">≈</span>
                    <span id="rightRate">0.00</span> <small id="rightUnit">/ sec</small>
                </div>

                <div class="details-list" id="rightDetails"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
